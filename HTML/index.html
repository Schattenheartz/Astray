<!DOCTYPE html> <!-- Indica que el documento usa HTML5 -->
<html lang="es"> <!-- Define el idioma del sitio (español) -->
<head>
    <meta charset="UTF-8"> <!-- Permite usar caracteres especiales como ñ, tildes, etc -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <!-- Hace que la página sea responsive (se adapte a móviles) -->

    <!-- Librería de iconos  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    
    <!-- Tu Archivo de Estilos CSS -->
    <link rel="stylesheet" href="../CSS/index.css">

    <title>Astray</title> <!-- Título que aparece en la pestaña -->
</head>

<body>
    <!-- HEADER: Contiene el menú de navegación -->
    <header class="header" id="header">

        <!-- NAV: barra de navegación -->
        <nav class="nav container">
            
            <!-- Logo -->
            <div class="nav__logo-box">
                <a href="#" class="nav__logo"> アストレイ </a> <!-- Nombre del Logo o Imagen  -->
            </div>

            <!-- MENÚ PRINCIPAL -->
            <div class="nav__menu" id="nav-menu">
                
                <!-- Lista de enlaces -->
                <ul class="nav__list">
                    
                    <!-- Cada item del menú -->
                    <li class="nav__item">
                        <a href="#" class="nav__link"><span>Inicio</span></a>
                    </li>

                    <li class="nav__item">
                        <a href="#" class="nav__link"><span>Menu</span></a>
                    </li>

                    <li class="nav__item">
                        <a href="#" class="nav__link"><span>Reservas</span></a>
                    </li>

                    <li class="nav__item">
                        <a href="#" class="nav__link"><span>Contacto</span></a>
                    </li>

                    <!-- Opciones que solo se muestran en móvil -->
                    <li class="nav__item nav__item-mobile">
                        <a href="#" class="nav__link">
                            <i class="ri-user-3-line"></i> <!-- Icono de usuario -->
                            <span>Mi Perfil</span>
                        </a>
                    </li>

                    <li class="nav__item nav__item-mobile">
                        <a href="#" class="nav__link">
                            <i class="ri-shopping-cart-line"></i> <!-- Icono de carrito -->
                            <span>Mis Compras</span>
                        </a>
                    </li>
                </ul>

                <!-- Botón para cerrar el menú (en móvil) -->
                <div class="nav__close" id="nav-close">
                  <i class="ri-close-large-line"></i>
                </div>

                <!-- Redes / Iconos Sociales -->
                <div class="nav__social">
                    <a href="#" target="_blank" class="nav__social-link">
                        <i class="ri-html5-fill"></i>
                    </a>
                    <a href="#" target="_blank" class="nav__social-link">
                        <i class="ri-css3-fill"></i>
                    </a>
                    <a href="#" target="_blank" class="nav__social-link">
                        <i class="ri-javascript-fill"></i>
                    </a>
                    <a href="https://github.com/" target="_blank" class="nav__social-link">
                        <i class="ri-github-fill"></i>
                    </a>
                </div>
            </div>

            <!-- ACCIONES DEL NAV (lado derecho) -->
            <div class="nav__actions">
                
                <!-- Acciones visibles en escritorio -->
                <div class="nav__actions-desktop">
                    <a href="#" class="nav__add-action">
                        <i class="ri-user-3-line"></i> <!-- Perfil -->
                    </a>
                    <a href="#" class="nav__add-action">
                        <i class="ri-shopping-cart-line"></i> <!-- Carrito -->
                    </a>
                </div>

                <!-- Botón Toggle (abre menú en móvil) -->
                <div class="nav__toggle" id="nav-toggle">
                    <i class="ri-menu-line"></i>
                </div>
            </div>

        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main">
        
        <!-- Sección inicial (vacía por ahora) -->
        <section class="home container">
        </section>

    </main>

    <!-- Archivo JavaScript -->
    <script src="../JS/index.js"></script>
</body>
</html>
